name: Publish to Terraform Public Registry

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROVIDER_NAME: ishosting
  GO_VERSION: "1.24"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determine version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          version="${{ steps.version.outputs.value }}"
          declare -a platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            bin="terraform-provider-${PROVIDER_NAME}_v${version}"
            [[ "$os" == "windows" ]] && bin="${bin}.exe"

            echo "::group::Building ${os}/${arch}"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "$bin" .

            zip_name="terraform-provider-${PROVIDER_NAME}_${version}_${os}_${arch}.zip"
            zip "$zip_name" "$bin"
            rm "$bin"
            echo "::endgroup::"
          done

      - name: Create manifest
        run: |
          version="${{ steps.version.outputs.value }}"
          cat > "terraform-provider-${PROVIDER_NAME}_${version}_manifest.json" <<'EOF'
          {
            "version": 1,
            "metadata": {
              "protocol_versions": ["5.0"]
            }
          }
          EOF

      - name: Generate SHA256SUMS
        id: shasums
        run: |
          version="${{ steps.version.outputs.value }}"
          shasums_file="terraform-provider-${PROVIDER_NAME}_${version}_SHA256SUMS"
          sha256sum terraform-provider-${PROVIDER_NAME}_${version}_*.zip > "$shasums_file"
          echo "file=$shasums_file" >> "$GITHUB_OUTPUT"
          cat "$shasums_file"

      - name: Import GPG key and sign SHA256SUMS
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          if [ -n "$GPG_PASSPHRASE" ]; then
            gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --detach-sign "${{ steps.shasums.outputs.file }}"
          else
            gpg --batch --pinentry-mode loopback \
              --detach-sign "${{ steps.shasums.outputs.file }}"
          fi

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.value }}"
          tag="${GITHUB_REF_NAME}"

          gh release create "$tag" \
            --title "v${version}" \
            --generate-notes \
            terraform-provider-${PROVIDER_NAME}_${version}_*.zip \
            terraform-provider-${PROVIDER_NAME}_${version}_manifest.json \
            terraform-provider-${PROVIDER_NAME}_${version}_SHA256SUMS \
            terraform-provider-${PROVIDER_NAME}_${version}_SHA256SUMS.sig

          echo "Release v${version} published with all assets"
